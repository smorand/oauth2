<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; }
        .card { background: white; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #991b1b; margin-bottom: 16px; font-size: 24px; }
        .description { text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ error }}</h1>
        <p class="description">{{ description }}</p>
    </div>
</body>
</html>
