<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Application</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; }
        .card { background: white; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        .scopes { list-style: none; padding: 0; margin: 0 0 24px 0; }
        .scopes li { padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 4px; margin-bottom: 8px; }
        .scope-name { font-weight: 500; }
        .scope-desc { color: #666; font-size: 13px; margin-top: 2px; }
        .buttons { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: 500; }
        .btn-approve { background: #2563eb; color: white; }
        .btn-approve:hover { background: #1d4ed8; }
        .btn-deny { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
        .btn-deny:hover { background: #e5e7eb; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Authorize</h1>
        <p class="subtitle"><strong>{{ client_name }}</strong> is requesting access to:</p>

        <ul class="scopes">
            {% for scope_name, scope_desc in scopes %}
            <li>
                <div class="scope-name">{{ scope_name }}</div>
                <div class="scope-desc">{{ scope_desc }}</div>
            </li>
            {% endfor %}
        </ul>

        <form method="post" action="/oauth/authorize/consent">
            <div class="buttons">
                <button type="submit" name="action" value="deny" class="btn btn-deny">Deny</button>
                <button type="submit" name="action" value="approve" class="btn btn-approve">Approve</button>
            </div>
        </form>
    </div>
</body>
</html>
