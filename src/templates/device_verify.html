<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Authorization</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; }
        .card { background: white; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 16px; box-sizing: border-box; font-size: 20px; text-align: center; letter-spacing: 4px; text-transform: uppercase; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: 500; }
        button:hover { background: #1d4ed8; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 10px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Device Authorization</h1>
        <p class="subtitle">Enter the code displayed on your device</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/oauth/device/verify">
            <label for="user_code">Device Code</label>
            <input type="text" id="user_code" name="user_code" value="{{ user_code }}" maxlength="8" required autofocus>

            <button type="submit">Continue</button>
        </form>
    </div>
</body>
</html>
