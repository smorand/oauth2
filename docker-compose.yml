# Docker Compose configuration
# Images are built with: make docker-build
# Start with: make run-up
# Stop with: make run-down

services:
  app:
    image: ${DOCKER_PREFIX:-}${PROJECT_NAME:-oauth2}:${DOCKER_TAG:-latest}
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - OAUTH2_ISSUER_URL=http://localhost:8000
      - OAUTH2_CSRF_SECRET=${OAUTH2_CSRF_SECRET:-change-me-in-production}
      - OAUTH2_DEBUG=false
    volumes:
      - ./data:/app/data
      - ./keys:/app/keys:ro
      - ./logs:/app/logs
